name: Overheid

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: overheid-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lint
      - run: make fetch
        env:
          API_KEY: ${{ secrets.API_KEY }}
      - run: make schemas
      - run: tree build
      - run: make one
